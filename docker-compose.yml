version: '3.8'

services:
  # API Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./services:/var/www/html
    depends_on:
      - ordering-app
      - notification-app
    networks:
      - eda-network

  # Ordering Microservice (The Publisher)
  ordering-app:
    build: 
      context: ./services/ordering-service
      dockerfile: Dockerfile
    volumes:
      - ./services/ordering-service:/var/www/html
    networks:
      - eda-network

  # Notification Microservice (The Consumer)
  notification-app:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    volumes:
      - ./services/notification-service:/var/www/html
    networks:
      - eda-network

  # Message Broker (Inter-service Event Bus)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - eda-network

  # Queue & Cache (Intra-service Horizon)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eda-network

  # Search Engine (Data Sync)
  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" 
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - eda-network

  # Relational Database
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: system_db 
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eda-network

networks:
  eda-network:
    driver: bridge

volumes:
  rabbitmq_data:
  redis_data:
  es_data:
  mysql_data: